name: Packer Build GitHub Runner

on:

  push:
    branches: [ main ]
    paths:
      - 'Packer/Github-Runner/**'

jobs:
  packer:
    runs-on: self-hosted
    env:
      PKR_VAR_REDHAT_ORGID: ${{ secrets.REDHAT_ORGID }}
      PKR_VAR_RHEL_ACTIVATION_KEY: ${{ secrets.RHEL_ACTIVATION_KEY }}
      PKR_VAR_ssh_password: ${{ secrets.SSH_PASSWORD }}
      PKR_VAR_ssh_username: ${{ secrets.SSH_USERNAME }}
      PKR_VAR_password: ${{ secrets.VCENTER_PASSWORD }}
      PKR_VAR_vcenter_server: ${{ secrets.VCENTER_SERVER }}
      PKR_VAR_username: ${{ secrets.VCENTER_USERNAME }}
      PKR_VAR_setup_username: ${{ secrets.SETUP_USERNAME }}
      PKR_VAR_setup_password: ${{ secrets.SETUP_PASSWORD }}
    defaults:
      run:
        working-directory: ./Packer/Github-Runner/
    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Get Runner IP Address
        id: get_ip
        run: |
         echo "ip=$(hostname -I | cut -d " " -f 1)" >> $GITHUB_OUTPUT

      - name: Packer Init
        run: /usr/bin/packer init .

      - name: Packer Format Check
        run: /usr/bin/packer fmt -check .

      - name: Packer Validate
        env: 
          PKR_VAR_bind_address: ${{ steps.get_ip.outputs.ip }}
        run: /usr/bin/packer validate .

      - name: Packer Build
        env: 
          PKR_VAR_bind_address: ${{ steps.get_ip.outputs.ip }}
        run: /usr/bin/packer build -force .

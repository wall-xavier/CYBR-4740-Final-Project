name: VSphere Packer Build

on:

  push:
    branches: [ main ]
    paths:
      - 'Packer/**'

strategy:
  matrix:
    template: ["RHEL-K8s-Worker"]

jobs:
  packer:
    runs-on: self-hosted
    env:
      PKR_VAR_REDHAT_ORGID: ${{ secrets.REDHAT_ORGID }}
      PKR_VAR_RHEL_ACTIVATION_KEY: ${{ secrets.RHEL_ACTIVATION_KEY }}
      PKR_VAR_ssh_password: ${{ secrets.SETUP_PASSWORD }}
      PKR_VAR_ssh_username: ${{ secrets.SETUP_USERNAME }}
      PKR_VAR_password: ${{ secrets.VCENTER_PASSWORD }}
      PKR_VAR_vcenter_server: ${{ secrets.VCENTER_SERVER }}
      PKR_VAR_username: ${{ secrets.VCENTER_USERNAME }}
      PKR_VAR_bind_address: ${{ secrets.RUNNER_IP }}
    defaults:
      run:
        working-directory: ./Packer/${{ matrix.template }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Packer Init
        run: packer init .

      - name: Packer Format Check
        run: packer fmt -check .

      - name: Packer Validate
        run: packer validate .

      - name: Packer Build
        run: packer build -force .
